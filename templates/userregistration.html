<!DOCTYPE html>
<html lang="en">
<head>
<!-- basic -->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- mobile metas -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="viewport" content="initial-scale=1, maximum-scale=1">
<!-- site metas -->
<title>Text Summarizer</title>
<meta name="keywords" content="">
<meta name="description" content="">
<meta name="author" content="">
<!-- bootstrap css -->
<link rel="stylesheet" type="text/css" href="static/css/bootstrap.min.css">
<!-- style css -->
<link rel="stylesheet" type="text/css" href="static/css/style.css">
<!-- Responsive-->

<!-- fevicon -->

<!-- owl stylesheets -->
<link rel="stylesheet" href="static/css/owl.carousel.min.css">
<link rel="stylesheet" href="static/css/owl.theme.default.min.css">

</head>
<body>
	<!--header section start -->
    <div class="header_section">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-3">
                    <div class="logo"><a href="index.html"><img src="static/images/logo.jpg"></a></div>
                </div>
                <div class="col-md-9">
                    <div class="menu_text">
                        <ul>
                            <li><a href={{url_for('index')}}>HOME</a></li>
                            <li><a href={{url_for('about')}}>ABOUT</a></li>

                            <div id="myNav" class="overlay">
                <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
                <div class="overlay-content">
                 <a href={{url_for('index')}}>HOME</a>
                  <a href={{url_for('about')}}>ABOUT</a>
                  <a href={{url_for('userlogin')}}>LOGIN</a>
                  <a href={{url_for('userregistration')}}>REGISTER</a>
                </div>
                </div>
                <span  style="font-size:33px;cursor:pointer; color: #ffffff;" onclick="openNav()"><img src="static/images/toggle.png" class="toggle_menu"></span>
                </div>
                </li>
                        </ul>
                    </div>
            </div>
        </div>
    </div>
    <!-- header section end -->
    <!-- banner section start -->
    <div class="banner_section layout_padding"style="padding-top: 110px;">
    	<div id="my_Controls" class="carousel slide" data-ride="carousel">
  <div class="overlay-content">
   <div class="wrapper row3">
  <main class="hoc container clear">
    <!-- main body -->
    <div class="content">
      <div id="comments">
        <center><h2>User Registration Page ....</h2></center>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
        <center style="color:white;">{{ message }}</center>
                {% endfor %}
              {% endif %}
            {% endwith %}
          <center>
        <form action="{{url_for('userregistration')}}" method="post" style="width: 1199px;margin-left: 229px;">
            <div class="one_third first">
                <label for="name">Name <span>*</span></label>
                <input type="text" name="username" placeholder="Enter Your Name" id="name" value="" size="22" required>
                 <label for="email">Mail <span>*</span></label>
                <input type="email" name="useremail" placeholder="Enter Your Email" id="email" value="" size="22" required>
                <label for="password">Password <span>*</span></label>
                <input type="password" name="userpassword" placeholder="Enter your Password" id="password" value="" size="22" required>
            </div>
            <div class="one_third second">
                <label for="conpassword">Confirm Password <span>*</span></label>
                <input type="password" name="conpassword" placeholder="Enter your conpassword" id="conpassword" value="" size="22" required>
              <br><br><br></center>
            <div class="one_third">

            </div><br><br>
          <br><br>

          <div>
            <input type="submit" class="btn btn-secondary" name="submit" value="Submit Form" style="margin-left: 320px;">
          </div>
        </form>
      </div>

    </div>

    <!-- / main body -->
    <div class="clear"></div>
  </main>
</div>    <!-- about section end -->




    <!-- Javascript files-->
    <script src="static/js/jquery.min.js"></script>
    <script src="static/js/popper.min.js"></script>
    <script src="static/js/bootstrap.bundle.min.js"></script>
      <script src="static/js/jquery-3.0.0.min.js"></script>
      <script src="static/js/plugin.js"></script>
      <!-- sidebar -->
      <script src="static/js/jquery.mCustomScrollbar.concat.min.js"></script>
      <script src="static/js/custom.js"></script>
      <!-- javascript -->
      <script src="static/js/owl.carousel.js"></script>
      <script src="https:cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
      <script>
      $(document).ready(function(){
      $(".fancybox").fancybox({
         openEffect: "none",
         closeEffect: "none"
         });

         $(".zoom").hover(function(){

         $(this).addClass('transition');
         }, function(){

         $(this).removeClass('transition');
         });
         });
         </script>


   <script>
    function openNav() {
    document.getElementById("myNav").style.width = "100%";
    }

    function closeNav() {
   document.getElementById("myNav").style.width = "0%";
   }
</script>




</body>
</html>
